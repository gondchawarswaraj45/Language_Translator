# Server port
server.port=8080

# H2 Database configuration (Default for easy setup)
spring.datasource.url=jdbc:h2:mem:translatordb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

# Show SQL in logs
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# For MySQL (Uncomment and configure if using MySQL)
# spring.datasource.url=jdbc:mysql://localhost:3306/translator_db
# spring.datasource.username=root
# spring.datasource.password=password
# spring.jpa.hibernate.ddl-auto=update
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Enable detailed error messages
server.error.include-message=always
